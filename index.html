<head><script>window.APP_DATA = [{"id":1,"title":"静夜思","dynasty":"唐","author":"李白","content":"床前明月光，\n疑是地上霜。\n举头望明月，\n低头思故乡。","translation":"Before my bed, the bright moonlight,\nI suspect it to be frost on the ground.\nI raise my head to gaze at the bright moon,\nLower it, thinking of my hometown.","notes":"疑是：似乎是。举头：抬头。低头：低头。","analysis":"此诗仅二十字，却以简洁的语言写出了游子夜思故乡的深切情感。月光与霜的错觉营造出静谧而略带凄凉的氛围，抬头望月与低头思乡的动作交替，层层递进，情感真挚而含蓄。","background":"李白曾长期漂泊，此诗据信作于他在蜀地旅居时，夜深人静，月光入室，触发乡思。","image":"https://example.com/images/jingyesi.jpg","themes":["思乡","月夜","孤独"]},{"id":2,"title":"春晓","dynasty":"唐","author":"孟浩然","content":"春眠不觉晓，\n处处闻啼鸟。\n夜来风雨声，\n花落知多少。","translation":"In spring sleep I am unaware of dawn,\nEverywhere I hear birds singing.\nLast night the sound of wind and rain,\nHow many flowers have fallen, I wonder.","notes":"春眠：春天的睡觉。处处：到处。知多少：不知道有多少。","analysis":"诗通过春 morning 的感官描写，表达对春天的喜爱与对花落的怜惜。前两句写春眠不觉晓，鸟声处处；后两句转写夜来风雨，花落不知数，暗含对时间流逝的感慨。","background":"孟浩然隐居鹿门山，常以田园生活为题。此诗想必写于春日清晨，感受春意盎然。","image":"https://example.com/images/chunxiao.jpg","themes":["春天","自然","怜花"]},{"id":3,"title":"江雪","dynasty":"唐","author":"柳宗元","content":"千山鸟飞绝，\n万径人踪灭。\n孤舟蓑笠翁，\n独钓寒江雪。","translation":"A thousand mountains, no bird in flight;\nTen thousand paths, no trace of man.\nA lone boat, an old man in straw cloak and hat,\nFishing alone in the cold river snow.","notes":"绝：完全没有。灭：消失。蓑笠：戴着草笠、披着草衣。","analysis":"此诗仅二十字，却画出一幅极其孤寂的冬景。前两句用‘千山’‘万径’夸张描写天地间的绝迹；后两句以‘孤舟’‘独钓’点出孤寂的身影，寒江雪映衬出诗人高洁孤傲的情怀。","background":"柳宗元被贬永州，居住在偏僻的江边，常感孤独与愤懑。此诗想必写于贬所生活期间，表达其不与世俗同流的志向。","image":"https://example.com/images/jiangxue.jpg","themes":["孤独","冬景","隐逸"]},{"id":4,"title":"登鹳雀楼","dynasty":"唐","author":"王之涣","content":"白日依山尽，\n黄河入海流。\n欲穷千里目，\n更上一层楼。","translation":"The white sun sets behind the mountains;\nThe Yellow River rushes to the sea.\nTo see a thousand miles further,\nClimb one more storey higher.","notes":"依山尽：傍山而尽。欲穷：想要穷尽。更上一层楼：再往上升一层。","analysis":"前两句写壮阔的自然景观，日落山尽，河流入海，给人以广阔之感；后两句转化为哲理，告诫人们要不断提升自己，才能看到更远的世界。语气雄浑，鼓舞人心。","background":"王之涣曾任职于河西，登鹳雀楼（今山西永济）时有此感。此诗常被用于劝勉人进取。","image":"https://example.com/images/dengguanque.jpg","themes":["壮志","自然","励志"]},{"id":5,"title":"望庐山瀑布","dynasty":"唐","author":"李白","content":"日照香炉生紫烟，\n遥看瀑布挂前川。\n飞流直下三千尺，\n疑是银河落九天。","translation":"Sunlight on the incense burner raises purple mist;\nFrom afar the waterfall hangs before the river.\nIt flies straight down three thousand feet,\nSeems like the Milky Way falling from the ninth heaven.","notes":"香炉：庐山的香炉峰。紫烟：紫色的雾气。飞流：飞泻的水流。疑是：好像是。","analysis":"诗中夸张的‘三千尺’与‘银河落九天’突显瀑布的磅礴气势，视觉与想象交织，展现李白豪放的想象力和对大自然的热爱。","background":"李白游庐山时所作，香炉峰瀑布是庐山著名景观，诗人被其壮丽景色所震撼。","image":"https://example.com/images/wanglushan.jpg","themes":["自然","壮丽","想象"]},{"id":6,"title":"赋得古原草送别","dynasty":"唐","author":"白居易","content":"离离原上草，\n一岁一枯荣。\n野火烧不尽，\n春风吹又生。\n远芳侵古道，\n晴翠接荒城。\n又送王孙去，\n萋萋满别情。","translation":"The grasses on the plain grow lush and dense,\nEach year they wither and flourish anew.\nWild fire cannot burn them out,\nSpring wind blows and they grow again.\nFragrant they invade the old road,\nGreen they meet the desolate city.\nOnce more I see off my friend,\nThe tender grass fills my feelings of parting.","notes":"离离：草木茂盛的样子。枯荣：枯萎与荣盛。萋萋：草木茂盛的样子。","analysis":"通过草的顽强生命力，比喻友情的永恒。诗结尾‘萋萋满别情’将景与情融合，表达依依不舍之情，同时又透露出对友情永续的希望。","background":"白居易送别友人王孙时所作，古原即长安东南的草原，常为送别之地。","image":"https://example.com/images/guyuancao.jpg","themes":["友情","送别","生命力"]},{"id":7,"title":"定风波·莫听穿林打叶声","dynasty":"宋","author":"苏轼","content":"莫听穿林打叶声，\n何妨吟啸且徐行。\n竹杖芒鞋轻胜马，\n谁怕？一蓑烟雨任平生。","translation":"Do not heed the sound of rain piercing the woods,\nWhy not chant and stroll at leisure.\nWith bamboo staff and straw sandals, lighter than a horse,\nWho fears? A single straw cloak lets me face mist and rain all my life.","notes":"穿林打叶声：雨声穿过树林打在叶子上的声音。吟啸：吟唱和啸叫。芒鞋：草编的鞋。一蓑烟雨：披着草衣，任风雨。","analysis":"此词豪放旷达，表达诗人对生活困境的淡然与超然。通过‘竹杖芒鞋轻胜马’和‘一蓑烟雨任平生’展现出对自然的亲近和对世俗束缚的漠视，情感开阔，气度宏大。","background":"苏轼被贬黄州期间，曾在雨中漫步，有此感而作。词中‘莫听穿林打叶声’正是对雨声的不以为意，表达豁达的生活态度。","image":"https://example.com/images/dingfengbo.jpg","themes":["豁达","自然","闲适"]},{"id":8,"title":"赤壁","dynasty":"唐","author":"杜牧","content":"折戟沉沙铁未销，\n自将磨洗认前朝。\n东风不与周郎便，\n铜雀春深锁二乔。","translation":"Broken halberds lie sunk in the sand, their iron not yet corroded;\nI myself polish and inspect them, recognizing the former dynasty.\nHad the east wind not favored Lord Zhou,\nThe Bronze Sparrow Pavilion would have locked the two Qiao in spring's deep seclusion.","notes":"折戟：断裂的戈戟。沉沙：埋在沙里。铁未销：铁未生锈。磨洗：擦拭。东风：东风。周郎：周瑜。铜雀春深锁二乔：指铜雀台春深，二乔被锁。","analysis":"诗人通过赤壁古战场的残破兵器，追思历史的兴衰。前两句写遗物犹在，感慨历史的沧桑；后两句假设东风不助周瑜，则历史走向可能完全不同，暗含对历史偶然性的感叹，同时也表达对人才与时运的深思。","background":"杜牧晚年游赤壁（今湖北蒲圻），见到战场遗迹，感慨三国历史而作此诗。","image":"https://example.com/images/chibi.jpg","themes":["历史","战争","感慨"]}];(function(d){try{if(Array.isArray(d)){["items","list","data","records","rows","all","results","content"].forEach(function(k){try{if(d[k]===undefined)d[k]=d;}catch(e){}});}window.APP_LIST=Array.isArray(d)?d:[];window.getById=function(id){return window.APP_LIST.find(function(x){return x&&String(x.id)===String(id);})||null;};}catch(e){}})(window.APP_DATA);</script>

function renderRecommendations(){
const list = document.getElementById('poem-list');
if(!list) return;
list.innerHTML = '';
const data = window.APP_DATA || [];
const recommended = data.slice(0,6); // take first six as recommendations
recommended.forEach(poem=>{
const card = document.createElement('div');
card.className = 'poem-card';

<div class="poem-meta">${poem.dynasty} · ${poem.author}</div>
<div class="poem-excerpt">${excerpt.replace(/\n/g,'<br>')}</div>
`;
list.appendChild(card);
});
}
function searchPoems(){

}
